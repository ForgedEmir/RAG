version: "3.9"

services:

  # ── Base vectorielle Qdrant (locale) ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lorekeeper-qdrant
    ports:
      - "6333:6333"   # API REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Flask ────────────────────────────────────────────────────────
  app:
    build: .
    container_name: lorekeeper-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Pointe sur le Qdrant local si QDRANT_URL n'est pas défini dans .env
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    volumes:
      - ./data:/app/data          # fichiers lore à indexer
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
