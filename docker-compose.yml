services:

  redis:
    image: redis:7-alpine
    container_name: lorekeeper-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: lorekeeper-app
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
      ENV: ${ENV:-production}
      APP_ENV: ${APP_ENV:-production}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      BACKGROUND_MAX_WORKERS: ${BACKGROUND_MAX_WORKERS:-8}
    volumes:
      - ./data:/app/data
      - lorekeeper_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  lorekeeper_data:
