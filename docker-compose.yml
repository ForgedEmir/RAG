version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: lorekeeper-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: lorekeeper-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
