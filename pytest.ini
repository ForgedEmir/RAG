[pytest]
# Configuration pytest pour le projet Oracle des Archives
minversion = 6.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers -ra

# Markers personnalisés
markers =
    slow: marque les tests qui sont lents
    integration: marque les tests d'intégration
    unit: marque les tests unitaires
